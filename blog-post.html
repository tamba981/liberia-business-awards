<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Liberia Business Awards - Blog Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); color: #333; line-height: 1.7; }
        .container { max-width: 900px; margin: 40px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        .header-gradient { background: linear-gradient(135deg, #FF0000 0%, #87CEEB 100%); padding: 50px 40px; color: white; position: relative; }
        .back-btn { background: white; color: #FF0000; padding: 12px 25px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; margin-bottom: 30px; }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,0,0,0.3); }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 42px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .content { padding: 50px; }
        .meta-info { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 14px; }
        .meta-item i { color: #FF0000; }
        .featured-image { width: 100%; height: 400px; object-fit: cover; border-radius: 15px; margin: 30px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .share-buttons { display: flex; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .share-btn { padding: 10px 20px; border-radius: 8px; color: white; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; }
        .share-facebook { background: #3b5998; }
        .share-twitter { background: #1da1f2; }
        .share-linkedin { background: #0077b5; }
        .share-whatsapp { background: #25d366; }
        .author-card { background: #f8fafc; padding: 25px; border-radius: 15px; margin: 30px 0; display: flex; gap: 20px; align-items: center; border-left: 4px solid #FF0000; }
        .author-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #FF0000, #87CEEB); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
        .cta-section { background: linear-gradient(135deg, #FF0000, #87CEEB); padding: 50px; border-radius: 20px; text-align: center; color: white; margin-top: 50px; }
        .cta-btn { background: white; color: #FF0000; padding: 15px 40px; border: none; border-radius: 50px; font-weight: 700; font-size: 18px; cursor: pointer; margin-top: 20px; transition: all 0.3s; }
        .loading-spinner { text-align: center; padding: 50px; color: #64748b; }
        @media (max-width: 768px) { .container { margin: 20px; } .content { padding: 30px 20px; } h1 { font-size: 32px; } .header-gradient { padding: 40px 20px; } .featured-image { height: 250px; } .author-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-gradient">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back to Blog Archive
            </button>
            <div id="postHeader">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p>Loading post...</p>
                </div>
            </div>
        </div>
        <div class="content" id="postContent">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Loading content...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://liberia-business-awards-production.up.railway.app/api';
        
        function getSlugFromURL() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (slug) return slug;
            return window.location.pathname.split('/').pop().replace('.html', '');
        }
        
        async function loadPost() {
            const slug = getSlugFromURL();
            if (!slug) { showError('No post specified'); return; }
            
            try {
                // First try localStorage
                let post = null;
                const savedPosts = localStorage.getItem('lba_blog_posts');
                if (savedPosts) {
                    const posts = JSON.parse(savedPosts);
                    post = posts.find(p => p.slug === slug);
                }
                
                // If not found in localStorage, try API
                if (!post) {
                    try {
                        const response = await fetch(`${API_BASE}/blog/posts?slug=${slug}`);
                        const data = await response.json();
                        if (data.success && data.post) {
                            post = data.post;
                        }
                    } catch (apiError) {
                        console.log('API not available, using localStorage only');
                    }
                }
                
                if (post) {
                    renderPost(post);
                } else {
                    showError('Post not found');
                }
            } catch (error) {
                console.error('Error loading post:', error);
                showError('Failed to load post');
            }
        }
        
        function renderPost(post) {
            document.title = `${post.title} - Liberia Business Awards`;
            
            const headerHtml = `
                <h1>${escapeHtml(post.title)}</h1>
                <div class="meta-info">
                    <div class="meta-item"><i class="far fa-calendar"></i> ${post.date || new Date(post.created_at).toLocaleDateString()}</div>
                    <div class="meta-item"><i class="far fa-clock"></i> ${post.read_time || '8 min read'}</div>
                    <div class="meta-item"><i class="fas fa-tag"></i> ${escapeHtml(post.category || 'Blog')}</div>
                    <div class="meta-item"><i class="fas fa-eye"></i> ${post.views || 0} views</div>
                </div>
            `;
            document.getElementById('postHeader').innerHTML = headerHtml;
            
            const contentHtml = `
                ${post.image ? `<img src="${post.image}" alt="${post.title}" class="featured-image" onerror="this.src='https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=800'">` : ''}
                <div class="post-body">
                    ${post.content || post.excerpt || 'No content available'}
                </div>
                
                ${post.author_name ? `
                <div class="author-card">
                    <div class="author-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <h3 style="margin-bottom: 5px;">${escapeHtml(post.author_name)}</h3>
                        <p style="color: #64748b; margin-bottom: 10px;">${escapeHtml(post.author_bio || 'Contributor at Liberia Business Awards')}</p>
                        <p>Share this article:</p>
                        <div class="share-buttons">
                            <button class="share-btn share-facebook" onclick="shareOnFacebook()"><i class="fab fa-facebook-f"></i> Facebook</button>
                            <button class="share-btn share-twitter" onclick="shareOnTwitter()"><i class="fab fa-twitter"></i> Twitter</button>
                            <button class="share-btn share-linkedin" onclick="shareOnLinkedIn()"><i class="fab fa-linkedin-in"></i> LinkedIn</button>
                            <button class="share-btn share-whatsapp" onclick="shareOnWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        </div>
                    </div>
                </div>
                ` : ''}
                
                <div class="cta-section">
                    <h2 style="color: white; border: none; margin-top: 0;">Ready to Share Your Story?</h2>
                    <p style="font-size: 18px; margin-bottom: 20px;">Nominate your business or partner with us to be featured in our next spotlight.</p>
                    <button class="cta-btn" onclick="goToHomepage()">
                        <i class="fas fa-award"></i> Explore Opportunities
                    </button>
                </div>
            `;
            document.getElementById('postContent').innerHTML = contentHtml;
        }
        
        function showError(message) {
            document.getElementById('postHeader').innerHTML = `
                <div class="error-message" style="text-align: center; padding: 50px; color: #EF4444;">
                    <i class="fas fa-exclamation-circle fa-2x" style="margin-bottom: 15px;"></i>
                    <p>${escapeHtml(message)}</p>
                    <button class="back-btn" onclick="goBack()" style="margin-top: 20px;">Back to Blog</button>
                </div>
            `;
            document.getElementById('postContent').innerHTML = '';
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function goBack() { window.location.href = 'blog-archive.html'; }
        function goToHomepage() { window.location.href = 'index.html'; }
        function shareOnFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); }
        function shareOnTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.title)}&url=${encodeURIComponent(window.location.href)}`, '_blank'); }
        function shareOnLinkedIn() { window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank'); }
        function shareOnWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(document.title + ' ' + window.location.href)}`, '_blank'); }
        
        loadPost();
    </script>
</body>
</html>
