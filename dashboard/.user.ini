; PHP Security Settings
; ============================================

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,phpinfo

; Disable remote file inclusion
allow_url_fopen = Off
allow_url_include = Off

; Enable safe mode like behavior
open_basedir = /home/username/public_html:/tmp

; Disable PHP error display in production
display_errors = Off
display_startup_errors = Off

; Log errors instead
log_errors = On
error_log = /home/username/logs/php-error.log

; Prevent session hijacking
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_only_cookies = 1
session.cookie_samesite = Strict

; Maximum input variables (prevent DoS)
max_input_vars = 1000
max_input_nesting_level = 64

; Execution limits
max_execution_time = 30
max_input_time = 30
memory_limit = 128M
